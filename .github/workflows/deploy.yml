name: Build & Deploy to Production

on:
  push:
    branches:
      - master

# Только один деплой одновременно; новый пуш отменяет предыдущий
concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/forgefit-frontend
  IMAGE_SERVER:   ghcr.io/${{ github.repository_owner }}/forgefit-server

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Build & push Docker images to GitHub Container Registry
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: meta
        run: |
          TAG=$(echo "${{ github.sha }}" | head -c 7)
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${TAG}"

      # ── Frontend ──────────────────────────────────────────────────────────────
      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── Backend ───────────────────────────────────────────────────────────────
      - name: Build & push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_SERVER }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_SERVER }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: SSH into server, pull new images, restart containers
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout code (for docker-compose.yml)
        uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          port:     ${{ secrets.DEPLOY_PORT || 22 }}
          source:   docker-compose.prod.yml
          target:   ${{ secrets.DEPLOY_PATH || '/opt/forgefit' }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          port:     ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e

            cd ${{ secrets.DEPLOY_PATH || '/opt/forgefit' }}

            # Log in to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" \
              | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Pull new images
            docker pull ${{ env.IMAGE_FRONTEND }}:latest
            docker pull ${{ env.IMAGE_SERVER }}:latest

            # Restart containers (zero-downtime: recreate one by one)
            docker compose -f docker-compose.prod.yml up -d \
              --no-build \
              --remove-orphans

            # Remove old unused images
            docker image prune -f

            echo "✅ Deployed commit ${{ github.sha }}"
